<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Kanit, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1, h2 {
            color: #333;
            text-align: center;
            width: 100%;
        }
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
            padding: 0 20px;
            box-sizing: border-box;
            border-radius: 20%;
            justify-content: center;
        }
        table {
            width: 60%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        th, td {
            text-align: center;
            padding: 12px;
            border: 1px solid #000;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        a {
            color: #333;
            text-decoration: none;
        }
        .delete-icon {
            color: #ff4444;
            cursor: pointer;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #333;
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
        }
        .back-link:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <h1>Leave Management</h1>
    
    <!-- <form action="{{ url_for('leave') }}" method="post" enctype="multipart/form-data">
        <h2>Apply for Leave</h2>
        <input type="text" name="reason" placeholder="Reason for leave" required>
        <label for="file">Attach Doctor's Note (Optional):</label>
        <input type="file" name="file" accept=".pdf,.png,.jpg,.jpeg">
        <button type="submit">Submit Leave Request</button>
    </form> -->
<form action="{{ url_for('leave') }}" method="post" enctype="multipart/form-data">
    <h2>Apply for Leave</h2>
    
    <label for="reason">Leave Reason:</label>
    <select name="reason" id="leave_reason" onchange="toggleUpload()" required>
        <option value="" disabled selected>Select a reason</option>
        <option value="Casual Leave">Casual Leave</option>
        <option value="Personal Reasons">Personal Reasons</option> 
        <option value="Medical Issue">Medical Issue</option>
    </select>

    <div id="medical_upload" style="display: none; margin-top: 10px;">
        <label for="file">Attach Doctor's Note (Required for Medical):</label>
        <input type="file" name="file" accept=".pdf,.png,.jpg,.jpeg">
    </div>

    <button type="submit" style="margin-top: 15px;">Submit Leave Request</button>
</form>
    <h2>Leave Requests</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Employee Name</th>
                <th>Reason</th>
                <th>Status</th>
                <th>Document</th>
            </tr>
        </thead>
        <tbody>
            {% for leave in leaves %}
            <tr>
                <td>{{ leave['id'] }}</td>
                <td>{{ leave['name'] }}</td>
                <td>{{ leave['reason'] }}</td>
                <td>{{ leave['status'] }}</td>
                <td>
                    {% if leave['document_url'] %}
                        <a href="{{ leave['document_url'] }}" target="_blank">View Docs</a>
                    {% else %}
                        No File
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{{ url_for('index') }}" class="back-link">Back</a>
    <script>
function toggleUpload() {
    var reason = document.getElementById('leave_reason').value;
    var uploadBox = document.getElementById('medical_upload');
    
    // Only show if 'Medical Issue' is selected
    if (reason === 'Medical Issue') {
        uploadBox.style.display = 'block';
    } else {
        uploadBox.style.display = 'none';
    }
}
</script>
</body>
</html>
